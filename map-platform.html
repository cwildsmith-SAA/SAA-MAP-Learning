    id: "overview", icon: "🗺️", title: "Understanding MAP Testing", subtitle: "Foundations of NWEA MAP", color: "#1a6b5a", accent: "#2dd4a7",
    lessons: [
      { title: "What is MAP Growth?", visual: "adaptive", content: `MAP Growth (Measures of Academic Progress) is an adaptive assessment developed by NWEA. Unlike traditional tests, MAP adapts in real time — if a student answers correctly, the next question is harder; if incorrectly, it becomes easier.

**Key Characteristics:**
• **Adaptive**: Questions adjust to student performance in real time
• **Norm-referenced**: Results compared to a national sample of ~11 million students
• **Seasonal**: Typically administered Fall, Winter, and Spring
• **Subjects**: Reading, Mathematics, Language Usage, and Science

**Why it matters:** MAP measures both achievement (where a student is) AND growth (how much they've learned), making it a powerful tool for instructional planning.` },
      { title: "The RIT Scale Explained", visual: "ritscale", content: `The **RIT (Rasch UnIT) scale** is a stable, equal-interval scale ranging roughly from 100–350. A student's RIT score represents their current level of achievement.

**Key facts about RIT scores:**
• **Equal intervals**: A 10-point difference means the same thing at any point on the scale
• **Continuous**: Students use the same scale from Kindergarten through Grade 12
• **Typical ranges by grade** (50th percentile, approximate):
• Kindergarten: ~148 | Grade 3: ~204 | Grade 5: ~220 | Grade 8: ~230 | Grade 10: ~238

**Important:** RIT scores are NOT percentages. A score of 220 does NOT mean 220 out of 300.` },
      { title: "Norming & Percentiles", visual: "bell", content: `NWEA regularly updates its norms using a large, nationally representative sample. Norms tell us how a student's score compares to other students in the same grade and testing season.

**Percentile Rank**: Shows what percentage of same-grade peers scored at or below a student's RIT score.
• 50th percentile = average performance for that grade
• 75th percentile = performing above 75% of same-grade peers
• 90th percentile = performing above 90% of same-grade peers

**Lexile & Quantile Links**: MAP scores can be cross-referenced with Lexile (reading) and Quantile (math) measures to find appropriately leveled resources.

**Caution:** Percentile ranks shift slightly with each norming update. Always use the current norms document when interpreting scores.` },

  {
    id: "reports", icon: "📊", title: "Reading Score Reports", subtitle: "Navigating the Data", color: "#2563a8", accent: "#60a5fa",
    lessons: [
      { title: "Individual Student Report", visual: "studentreport", content: `The **Individual Student Profile** is your window into one student's performance. Here's what to look for:

**Key Data Points:**
• **RIT Score**: Current achievement level
• **Standard Error (SE)**: Margin of error — typically ±3 points. The student's "true" score falls within RIT ± SE
• **Percentile Rank**: Compared to national norms
• **Lexile/Quantile Range**: For matched resources

**Goal Area Breakdown**: Below the overall RIT, you'll see sub-scores for each goal area (e.g., in Reading: Literary Text, Informational Text, Vocabulary). These reveal strengths and gaps within the subject.

**Growth**: Compare Fall → Winter → Spring RIT scores. Look at whether the student met their projected growth target.` },
      { title: "Class & Grade Reports", visual: "classreport", content: `Class-level reports help you see patterns across your whole group and identify clusters of students with similar needs.

**Class Overview Report:**
• Distribution of RIT scores (histogram or list)
• Average RIT vs. national average for that grade/season
• Percentage meeting or exceeding projected growth

**Instructional Grouping Suggestions:**
NWEA provides suggested instructional ranges. Students within ~5 RIT points of each other have overlapping instructional needs.

**What to look for:**
• **Bimodal distribution**: Two clusters may indicate two very different instructional groups
• **High variance**: Wide spread = need for significant differentiation
• **Above-grade clusters**: Students needing enrichment or acceleration` },
      { title: "Growth Reports", visual: "growth", content: `Growth data shows how much a student has learned over a period — and whether it was enough.

**Conditional Growth Percentile (CGP)**: How a student's actual growth compares to peers who started at the same RIT. A CGP of 50 = average growth; 75 = grew more than 75% of similar peers.

**Projected vs. Actual Growth:**
• NWEA provides a growth projection for each student based on their starting score, grade, and season
• Comparing projected to actual shows whether instruction is working

**Growth-Achievement Matrix:**
• High Achievement + High Growth → Thriving
• High Achievement + Low Growth → Coasting (very common in gifted populations — and often missed)
• Low Achievement + High Growth → Catching Up
• Low Achievement + Low Growth → Falling Behind` },
    ],

  {
    id: "goalarea", icon: "🎯", title: "Goal Areas & Sub-Scores", subtitle: "Diagnostic Depth", color: "#7c3aed", accent: "#c084fc",
    lessons: [
      { title: "Reading Goal Areas", visual: "goalreading", content: `MAP Reading breaks into **Goal Areas** that align with Common Core and other standards. Understanding these sub-scores pinpoints exactly where students need support.

**Reading Goal Areas:**
• **Literary Text**: Analyzing fiction, poetry, drama — character, theme, plot, structure
• **Informational Text**: Nonfiction comprehension — main idea, text structure, author's purpose
• **Vocabulary**: Understanding words in context, figurative language, academic vocabulary
• **Foundational Skills** (K-2): Print concepts, phonological awareness, phonics, fluency

**Interpreting sub-scores:**
• Sub-scores have a larger standard error than the overall score
• Look for patterns: Is a student consistently low in Vocabulary? That's an instructional target.
• A student can have a high overall RIT but a relative weakness in a goal area — still worth addressing.` },
      { title: "Math Goal Areas", visual: "goalmath", content: `MAP Math goal areas align with mathematical practice domains. Drilling into these reveals specific skill gaps.

**Math Goal Areas:**
• **Operations & Algebraic Thinking**: Number operations, patterns, equations
• **Numbers & Operations**: Place value, fractions, decimals, ratios
• **Measurement & Data**: Measurement tools, data interpretation, statistics
• **Geometry**: Shapes, spatial reasoning, coordinate planes

**For older students (6-10):**
• **Functions**: Linear, non-linear, domain/range
• **Statistics & Probability**: Data analysis, probability concepts

**Actionable Use:**
If a 5th grader has an overall Math RIT of 240 but a lower sub-score in Geometry, you know exactly where to target enrichment — even within a gifted profile.` },
      { title: "Using the Learning Continuum", visual: "continuum", content: `The **NWEA Learning Continuum** is one of the most powerful — and underused — tools available. It maps RIT scores to specific skills and concepts students are ready to learn.

**How to Use It:**
1. Find a student's RIT score (or a group's range)
2. Look up that range in the Learning Continuum
3. See the skills students are **likely to know** and **ready to learn next**
4. Use those skill descriptors to select targeted practice resources and write lesson plans

**For Gifted Learners:** Look up RIT ranges 2–3 grade levels above the student's current grade. This reveals the specific advanced skills they are ready to tackle — making the Continuum your primary acceleration planning tool.

**Pro Tip:** Print the Continuum for your class's actual RIT range (not grade level) and highlight what students already know vs. what they're ready to learn next.` },
    ],
  },
  {
    id: "differentiation", icon: "✏️", title: "Differentiated Instruction", subtitle: "Turning Data into Action", color: "#b45309", accent: "#fbbf24",
    lessons: [
      { title: "Forming Flexible Groups", visual: "groups", content: `MAP data is ideal for forming **flexible, data-driven small groups** — not permanent ability tracks, but temporary groupings around specific skills.

**Step-by-Step Grouping Process:**
1. **Pull your Class Breakdown report** — sort by RIT score
2. **Identify natural clusters** — groups of students within ~5 RIT points
3. **Cross-reference goal areas** — do students in the same RIT range share the same weakness?
4. **Form your groups** — 3–5 students per group works well
5. **Plan targeted instruction** — use the Learning Continuum to match skills to each group
6. **Reassess and regroup** — after 4–6 weeks, re-examine data

**Flexible grouping principles:**
• Groups change based on skill — a student might be in different groups for Reading vs. Math
• Use grouping for small-group instruction, NOT for permanent labeling
• Communicate growth focus to students and families` },
      { title: "Tiered Assignments", visual: "tiered", content: `Use RIT ranges to **tier the same core assignment** so all students work on the same essential question but at an appropriate level of complexity.

**Example: A fiction analysis lesson**
• **Tier 1 (Support)**: Sentence frames, graphic organizers, shorter text with same theme
• **Tier 2 (On Grade)**: Standard task with grade-level text
• **Tier 3 (Enrichment)**: Extended analysis, compare/contrast two texts, independent extension

**Key Principles:**
• All tiers address the SAME learning objective — complexity differs, not the concept
• Avoid giving students more/less work — give different depth
• Never make enrichment feel like punishment (no "more worksheets")
• Rotate materials so students know tiers can change` },
      { title: "Targeted Intervention & Enrichment", visual: "intervention", content: `MAP data helps you identify students who need **intensive support** or **accelerated challenge** — and gives you the RIT-based precision to act on it.

**For Students Needing Enrichment:**
• Students 15+ points above grade-level norms need challenge, not more of the same
• Use their RIT to find next-grade-level skills they're ready for
• Consider compacting curriculum — they may not need the full unit
• Extension options: independent research, above-grade texts, mentorship

**Communication Tips:**
• Share specific RIT-based language with parents: "Your child is reading at a level typical for a mid-6th grader; our goal this year is to reach mid-7th grade level."
• Use growth charts to show progress over time, not just current score` },

  {
    id: "gifted", icon: "⭐", title: "Gifted Learners & the 90th+ Classroom", subtitle: "Advanced Differentiation Strategies", color: "#0e3d6b", accent: "#38bdf8", badge: "YOUR SCHOOL",
    lessons: [
      { title: "Reading MAP Data in a Gifted Context", visual: "giftedoverview", content: `When every student in your classroom scores at the **90th percentile or above**, traditional MAP interpretation needs to be reframed entirely. The question is no longer "Is this student on grade level?" — they all are, and well beyond it. The real question becomes: **"How do I measure and promote meaningful growth for students who already exceed grade-level expectations?"**

**Reframing Your Lens:**
• **Percentile rank becomes less useful**: When all students are 90th+, national norms don't meaningfully differentiate your class
• **RIT score is your true anchor**: Focus on absolute RIT values and growth across seasons, not grade-level benchmarks
• **Ceiling effect is a real risk**: If gifted students are not growing, it means instruction isn't stretching them — not that they've "maxed out"

**The "Coasting" Problem:**
High achievement + low growth is one of the most common and overlooked problems in gifted classrooms. A student scoring at the 97th percentile who shows zero RIT growth has not been adequately challenged. MAP data makes this visible — and actionable.

**Your New North Star:**
The national average is irrelevant as a target for your students. Your benchmark is each student's own prior RIT score. Growth of 3–5 RIT points per year is still expected — even at the 95th percentile.` },
      { title: "Subject Acceleration Using RIT Scores", visual: "acceleration", content: `RIT scores allow you to make **evidence-based decisions about subject-specific acceleration** — one of the most powerful tools available for gifted learners.

**What is Subject Acceleration?**
Placing a student in above-grade-level content for a specific subject where their RIT score already exceeds the norm for older grades.

**How to Identify Candidates:**
• Pull the student's RIT and compare it to NWEA norms for grades 1–3 above their current grade
• If a 4th grader's Math RIT (e.g., 241) equals or exceeds the 50th percentile for 7th graders → strong acceleration candidate
• Cross-reference with goal area sub-scores to confirm readiness across all domains, not just overall RIT

**Types of Acceleration:**
• **Curriculum Compacting**: Pre-assess a unit; if mastery is demonstrated, replace with above-grade content
• **Single-Subject Acceleration**: Student attends a higher grade for that subject only
• **Above-Grade Materials**: Student stays in classroom but works from next-grade curriculum
• **Telescoping**: Completing two years of content in one year, using MAP growth data to set pacing

**Important Note:**
Acceleration decisions should combine MAP data with other evidence — teacher observation, student readiness, and social-emotional factors. MAP is the "what"; professional judgment is the "how."` },
      { title: "Differentiation Within a Gifted Cohort", visual: "giftedspread", content: `Even within a high-achieving school, **gifted students are not a monolith**. A classroom where everyone scores 90th+ still contains a meaningful RIT spread that demands differentiation.

**Understanding the Spread:**
• 90th percentile for a 5th grader ≈ RIT 233
• 99th percentile for a 5th grader ≈ RIT 248+
• That's a 15-point spread — equivalent to the difference between a 3rd and 5th grader nationally

**Differentiating Within Your Gifted Classroom:**
• **Use RIT sub-bands**: Even within your high-performing cohort, group students within 4–5 RIT points for targeted instruction
• **Asynchronous development**: A student may be at the 99th percentile in Reading but "only" the 90th in Math — differentiate by subject, not by overall label
• **Goal area targeting**: Use sub-scores to identify which students need depth vs. breadth challenges in each domain

**The Gifted Outlier:**
In most classrooms, the highest-scoring students score 8–10+ points above their classmates. These students may need individualized learning plans, mentor connections, or university-level resources. MAP data is your documentation tool for advocating for these extraordinary placements.` },
      { title: "Depth, Complexity & Curriculum Compacting", visual: "depthcomplexity", content: `For gifted learners at the 90th percentile and above, **depth and complexity** — not just harder content — is the gold standard of differentiation.

**Curriculum Compacting (The MAP Way):**
1. **Pre-assess** using MAP goal area sub-scores before a unit begins
2. **If a student already scores at or above** the expected end-of-unit RIT → they have likely mastered those skills
3. **Compact** the standard unit: replace repeated practice with authentic extension work
4. **Document** the compacting decision using MAP data — powerful for Advanced Learning Plan records

**Depth Over Mere Acceleration:**
Sometimes going deeper into grade-level content is more appropriate than racing ahead. Strategies include:
• **Socratic Seminars**: Use complex texts matched to students' actual Lexile — not just their grade level
• **Inquiry-Based Projects**: Students design their own questions within a domain
• **Cross-disciplinary Connections**: Linking math reasoning to historical analysis, science data to literary themes
• **Philosophical Exploration**: Ethical dilemmas, abstract thinking, hypothetical scenarios

**Complexity Frameworks to Layer In:**
• **Bloom's Taxonomy**: Push gifted learners to evaluate, synthesize, and create — not just recall or apply
• **Kaplan's Depth & Complexity Icons**: Language of the Discipline, Big Ideas, Unanswered Questions, Ethics
• **Paul's Elements of Reasoning**: Used for advanced critical thinking across any subject area` },
      { title: "Growth Goals & Progress Monitoring", visual: "giftedgrowth", content: `For gifted students, setting and monitoring **meaningful growth goals** requires a different framework than standard MAP benchmarks.

**Why Standard Benchmarks Fall Short:**
NWEA's default growth projections are designed for typical students across all percentile levels. For students already at the 90th+ percentile, projected growth norms are actually lower due to regression toward the mean. This can create a false sense that "any growth is enough."

**Setting Ambitious Growth Goals:**
• **Do not use grade-level norms as targets** — use the student's own prior RIT + expected seasonal growth
• For a student at RIT 240, target RIT 244–246 by next testing season
• For your highest scorers (95th–99th percentile), even 2–3 RIT points of growth per year reflects successful instruction
• For students showing flat or declining RIT scores, treat it as an instructional urgency — gifted students can and do regress when underchallenged

**Progress Monitoring Between MAP Windows:**
• Use **DesCartes** (NWEA's skill framework) to track mastery of specific skills between testing seasons
• Formative assessments aligned to above-grade standards provide interim data
• Student goal-setting conversations using their own RIT timeline build metacognitive awareness

**Communicating Growth to Families:**
Gifted families often ask "what grade level" their child is at. Reframe this: share the RIT score, its grade-level equivalent, AND the growth goal. Celebrate growth — not just the high score.` },
      { title: "Resources & Tools for Gifted Instruction", visual: "resources", content: `Translating MAP data into gifted instruction requires resources that match the sophistication of your students. Here is a curated toolkit organized by purpose.

**Finding Above-Grade Content Using RIT:**
• **NWEA Learning Continuum**: Look up RIT ranges 2–4 grade levels above current grade for instructional targets
• **DesCartes**: Download the subject-specific DesCartes document and use the RIT band 2–3 grades up
• **Lexile Framework**: Use the student's MAP Reading Lexile to find texts at the high end of their band or slightly above

**Curriculum Resources by Subject:**
• **Reading/ELA**: Junior Great Books, William & Mary Language Arts, Socratic Seminars International
• **Math**: Art of Problem Solving (AoPS), MATHCOUNTS, Beast Academy (grades 2–5), Alcumus platform
• **Science**: Science Olympiad resources, STEM challenge banks, National Science Bowl prep
• **Social Studies/Humanities**: Facing History and Ourselves, Library of Congress Primary Sources

**Assessment & Documentation Tools:**
• Pre/post assessments aligned to above-grade standards (for compacting documentation)
• Student growth portfolios with RIT timeline charts
• Advanced Learning Plan (ALP) templates referencing MAP data as baseline evidence

**Enrichment Platforms (RIT-matched):**
• **Khan Academy**: Use the grade-level selector to assign 2–3 grades above current grade
• **IXL**: Filter by skill level above grade; use MAP score to identify specific skill strands
• **Newsela**: Set Lexile above grade level based on MAP Reading score
• **Art of Problem Solving**: Ideal for students 95th+ in Math — competition-level problem solving` },

function parseMarkdown(text) {
  return text.split("\n").map((line, i) => {
    if (line.startsWith("• ")) {
      const html = line.slice(2).replace(/\*\*(.*?)\*\*/g, "<strong style='color:#f9fafb'>$1</strong>");
      return <div key={i} style={{ display: "flex", gap: 8, marginTop: 5, paddingLeft: 6 }}>
        <span style={{ color: "#4b5563", flexShrink: 0, marginTop: 3, fontSize: 10 }}>●</span>
        <span style={{ color: "#d1d5db", lineHeight: 1.7, fontFamily: "sans-serif", fontSize: 14 }} dangerouslySetInnerHTML={{ __html: html }} />
      </div>;
    }
    const html = line.replace(/\*\*(.*?)\*\*/g, "<strong style='color:#f9fafb'>$1</strong>");
    return line.trim()
      ? <p key={i} style={{ color: "#d1d5db", lineHeight: 1.75, marginTop: 6, fontFamily: "sans-serif", fontSize: 14 }} dangerouslySetInnerHTML={{ __html: html }} />
      : <div key={i} style={{ height: 6 }} />;
  });
}

                {activeModule === mi && !m.isQuiz && m.lessons.map((l, li) => (
                  <div key={li} onClick={() => setActiveLesson(li)}
                    style={{ padding: "7px 12px 7px 40px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, background: activeLesson === li ? "rgba(255,255,255,0.03)" : "transparent", borderLeft: activeLesson === li ? `3px solid ${m.accent}40` : "3px solid transparent" }}>
                    <div style={{ width: 16, height: 16, borderRadius: "50%", flexShrink: 0, fontSize: 8, display: "flex", alignItems: "center", justifyContent: "center", background: isCompleted(mi, li) ? m.accent : "rgba(255,255,255,0.07)", color: isCompleted(mi, li) ? "#000" : "#9ca3af", fontFamily: "sans-serif", fontWeight: "bold" }}>
                      {isCompleted(mi, li) ? "✓" : li + 1}
                    </div>
                    <div style={{ fontSize: 11, color: activeLesson === li ? "#e5e7eb" : "#6b7280", lineHeight: 1.3, fontFamily: "sans-serif" }}>{l.title}</div>
                  </div>
                ))}
              </div>
            ))}
          </aside>
        )}

        {/* Main */}
        <main ref={contentRef} style={{ flex: 1, overflowY: "auto", padding: "26px 30px 40px", maxWidth: 840 }}>

          {mod.isQuiz ? (
            <div>
              <div style={{ marginBottom: 22 }}>
                <div style={{ fontSize: 24, fontWeight: "bold", color: "#f9fafb", marginBottom: 4 }}>🧪 Practice Scenarios</div>
                <div style={{ color: "#6b7280", fontFamily: "sans-serif", fontSize: 13 }}>Realistic classroom scenarios including gifted contexts</div>
              </div>
              {quizState.done ? (
                <div style={{ background: "#080a10", border: "1px solid #1a1f2e", borderRadius: 16, padding: 36, textAlign: "center" }}>
                  <div style={{ fontSize: 52, marginBottom: 14 }}>{quizState.score >= 5 ? "🎉" : quizState.score >= 3 ? "👍" : "📚"}</div>
                  <div style={{ fontSize: 28, fontWeight: "bold", color: "#f9fafb", marginBottom: 8, fontFamily: "sans-serif" }}>{quizState.score} / {quizQuestions.length}</div>
                  <div style={{ color: "#9ca3af", fontFamily: "sans-serif", marginBottom: 22 }}>
                    {quizState.score === quizQuestions.length ? "Perfect! You're ready to use MAP data expertly in your gifted classroom." : quizState.score >= 4 ? "Great work! Review the lessons you missed and try again." : "Keep studying — revisit the modules and try again."}
                  </div>
                  <button onClick={() => setQuizState({ current: 0, selected: null, answered: false, score: 0, done: false })} style={{ background: "#be185d", color: "#fff", border: "none", padding: "10px 24px", borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif" }}>Try Again</button>
                </div>
              ) : (
                <div>
                  <div style={{ fontFamily: "sans-serif", fontSize: 12, color: "#6b7280", marginBottom: 12 }}>Question {quizState.current + 1} of {quizQuestions.length}</div>
                  <div style={{ background: "#080a10", border: "1px solid #1a1f2e", borderRadius: 16, padding: 24, marginBottom: 12 }}>
                    <div style={{ fontSize: 16, color: "#f3f4f6", lineHeight: 1.65, marginBottom: 20, fontFamily: "sans-serif" }}>{quizQuestions[quizState.current].q}</div>
                    {quizQuestions[quizState.current].options.map((opt, i) => {
                      const isCorrect = i === quizQuestions[quizState.current].answer;
                      const isSel = quizState.selected === i;
                      let bg = "rgba(255,255,255,0.02)", bd = "#1f2937";
                      if (quizState.answered) { if (isCorrect) { bg = "rgba(74,222,128,0.07)"; bd = "#4ade80"; } else if (isSel) { bg = "rgba(239,68,68,0.07)"; bd = "#ef4444"; } }
                      else if (isSel) { bg = "rgba(96,165,250,0.07)"; bd = "#60a5fa"; }
                      return (
                        <div key={i} onClick={() => handleQuizAnswer(i)} style={{ background: bg, border: `1px solid ${bd}`, borderRadius: 10, padding: "12px 14px", marginBottom: 8, cursor: quizState.answered ? "default" : "pointer", display: "flex", gap: 10, alignItems: "flex-start" }}>
                          <div style={{ width: 20, height: 20, borderRadius: "50%", background: bd === "#1f2937" ? "rgba(255,255,255,0.07)" : bd, color: bd === "#1f2937" ? "#9ca3af" : "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, flexShrink: 0, fontFamily: "sans-serif", fontWeight: "bold" }}>{String.fromCharCode(65 + i)}</div>
                          <div style={{ color: "#d1d5db", fontFamily: "sans-serif", lineHeight: 1.5, fontSize: 14 }}>{opt}</div>
                        </div>
                      );
                    })}
                    {quizState.answered && (
                      <div style={{ background: quizState.selected === quizQuestions[quizState.current].answer ? "rgba(74,222,128,0.05)" : "rgba(239,68,68,0.05)", border: `1px solid ${quizState.selected === quizQuestions[quizState.current].answer ? "#4ade8030" : "#ef444430"}`, borderRadius: 10, padding: 14, marginTop: 12 }}>
                        <div style={{ fontSize: 12, fontWeight: "bold", color: quizState.selected === quizQuestions[quizState.current].answer ? "#4ade80" : "#ef4444", marginBottom: 5, fontFamily: "sans-serif" }}>
                          {quizState.selected === quizQuestions[quizState.current].answer ? "✓ Correct!" : "✗ Not quite"}
                        </div>
                        <div style={{ color: "#9ca3af", fontFamily: "sans-serif", fontSize: 13, lineHeight: 1.65 }}>{quizQuestions[quizState.current].explanation}</div>
                      </div>
                    )}
                  </div>
                  {quizState.answered && (
                    <button onClick={nextQ} style={{ background: "#be185d", color: "#fff", border: "none", padding: "10px 22px", borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif" }}>
                      {quizState.current + 1 >= quizQuestions.length ? "See Results →" : "Next Question →"}
                    </button>
                  )}
                </div>
              )}
            </div>

          ) : lesson ? (
            <div>
              {/* Gifted banner */}
              {mod.id === "gifted" && (
                <div style={{ background: "linear-gradient(135deg, rgba(14,61,107,0.85), rgba(56,189,248,0.12))", border: "1px solid rgba(56,189,248,0.28)", borderRadius: 12, padding: "12px 16px", marginBottom: 20, display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 22 }}>⭐</span>
                  <div>
                    <div style={{ fontSize: 11, color: "#38bdf8", fontWeight: "bold", fontFamily: "sans-serif", textTransform: "uppercase", letterSpacing: 1 }}>Tailored for Your School</div>
                    <div style={{ fontSize: 12, color: "#7dd3fc", fontFamily: "sans-serif", marginTop: 2 }}>This module is specifically designed for classrooms where every student scores at the 90th percentile or above on MAP assessments.</div>
                  </div>
                </div>
              )}

              {/* Module header */}
              <div style={{ display: "flex", gap: 12, alignItems: "flex-start", marginBottom: 20 }}>
                <div style={{ width: 44, height: 44, borderRadius: 12, background: `${mod.color}90`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>{mod.icon}</div>
                <div>
                  <div style={{ fontSize: 11, color: mod.accent, fontFamily: "sans-serif", textTransform: "uppercase", letterSpacing: 1, marginBottom: 3 }}>{mod.title}</div>
                  <div style={{ fontSize: 22, fontWeight: "bold", color: "#f9fafb", lineHeight: 1.2 }}>{lesson.title}</div>
                </div>
              </div>

              {/* Lesson tabs */}
              <div style={{ display: "flex", gap: 5, marginBottom: 22, flexWrap: "wrap" }}>
                {mod.lessons.map((l, li) => (
                  <button key={li} onClick={() => setActiveLesson(li)} style={{ padding: "4px 11px", borderRadius: 18, border: "none", cursor: "pointer", fontFamily: "sans-serif", fontSize: 11, background: activeLesson === li ? mod.accent : isCompleted(activeModule, li) ? `${mod.color}50` : "rgba(255,255,255,0.06)", color: activeLesson === li ? "#000" : isCompleted(activeModule, li) ? mod.accent : "#9ca3af", fontWeight: activeLesson === li ? "bold" : "normal" }}>
                    {isCompleted(activeModule, li) ? "✓ " : ""}{li + 1}. {l.title.split(" ").slice(0, 3).join(" ")}
                  </button>
                ))}
              </div>

              {/* Content */}
              <div style={{ background: "#080a10", border: "1px solid #1a1f2e", borderRadius: 16, padding: 26, marginBottom: 18 }}>
                {parseMarkdown(lesson.content)}
                {lesson.visual && getVisual(lesson.visual)}
              </div>

              {/* Takeaway */}
              <div style={{ background: `${mod.color}18`, border: `1px solid ${mod.accent}30`, borderRadius: 12, padding: 16, marginBottom: 20 }}>
                <div style={{ fontSize: 11, fontFamily: "sans-serif", color: mod.accent, marginBottom: 4, textTransform: "uppercase", letterSpacing: 1 }}>💡 Instructional Takeaway</div>
                <div style={{ color: "#d1d5db", fontFamily: "sans-serif", fontSize: 13, lineHeight: 1.7 }}>{takeaways[`${activeModule}-${activeLesson}`] || "Use this data to guide targeted instructional decisions for your students."}</div>
              </div>

              {/* Nav */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <button
                  onClick={() => activeLesson > 0 ? setActiveLesson(l => l - 1) : activeModule > 0 ? (setActiveModule(m => m - 1), setActiveLesson(modules[activeModule - 1].lessons.length - 1)) : null}
                  style={{ background: "rgba(255,255,255,0.06)", color: "#9ca3af", border: "none", padding: "9px 16px", borderRadius: 8, cursor: "pointer", fontFamily: "sans-serif", fontSize: 12 }}
                >← Previous</button>
                <button
                  onClick={markComplete}
                  style={{ background: mod.color, color: "#fff", border: "none", padding: "10px 22px", borderRadius: 8, cursor: "pointer", fontFamily: "sans-serif", fontSize: 13, fontWeight: "bold" }}
                >
                  {isCompleted(activeModule, activeLesson) ? "Next →" : "Mark Complete & Continue →"}
                </button>
              </div>
            </div>
          ) : null}
        </main>
      </div>
    </div>
  );
}


const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(<App />);
  </script>
</body>
</html>
